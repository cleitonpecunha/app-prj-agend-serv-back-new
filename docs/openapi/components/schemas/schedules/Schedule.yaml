type: object
properties:
  id:
    type: integer
    example: 1
  providerId:
    type: integer
    example: 1
  dayOfWeek:
    type: string
    enum:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
      - saturday
      - sunday
    example: monday
  startTime:
    type: string
    description: Horário de início no formato HH:MM (24h).
    pattern: "^([01]\\d|2[0-3]):([0-5]\\d)$"
    example: "09:00"
  endTime:
    type: string
    description: Horário de término no formato HH:MM (24h). Deve ser maior que startTime.
    pattern: "^([01]\\d|2[0-3]):([0-5]\\d)$"
    example: "17:00"
  createdAt:
    type: string
    format: date-time
    example: "2026-04-27T10:00:00.000Z"
  updatedAt:
    type: string
    format: date-time
    example: "2026-04-27T10:00:00.000Z"
required:
  - id
  - providerId
  - dayOfWeek
  - startTime
  - endTime
  - createdAt
  - updatedAt
