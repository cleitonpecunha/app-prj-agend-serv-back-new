type: object
description: |
  Payload para atualização completa de um horário (PUT).
  Todos os campos são obrigatórios. `providerId` não pode ser alterado.
  `startTime` deve ser menor que `endTime`.
properties:
  dayOfWeek:
    type: string
    enum:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
      - saturday
      - sunday
    example: tuesday
  startTime:
    type: string
    description: Horário de início no formato HH:MM (24h).
    pattern: "^([01]\\d|2[0-3]):([0-5]\\d)$"
    example: "08:00"
  endTime:
    type: string
    description: Horário de término no formato HH:MM (24h). Deve ser maior que startTime.
    pattern: "^([01]\\d|2[0-3]):([0-5]\\d)$"
    example: "12:00"
required:
  - dayOfWeek
  - startTime
  - endTime
