type: object
properties:
  name:
    type: string
    example: Corte de cabelo premium
  description:
    type: string
    example: Corte masculino com acabamento e penteado
  durationMinutes:
    type: integer
    description: Duração do serviço em minutos. Deve ser um inteiro positivo.
    example: 45
  price:
    type: number
    format: float
    description: Preço do serviço. Deve ser um número positivo.
    example: 75.00
  isActive:
    type: boolean
    description: Indica se o serviço está ativo.
    example: true
required:
  - name
  - description
  - durationMinutes
  - price
  - isActive
